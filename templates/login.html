<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - TaskFlow</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0f;
      color: #fff;
      overflow: hidden;
    }

    /* 🎬 VIDEO BACKGROUND */
    .bg-video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
      opacity: 0.35;
      pointer-events: none;
      filter: brightness(0.8) contrast(1.1);
    }

    /* 🌌 NEON OVERLAY */
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 20% 30%, rgba(124,58,237,0.25), transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(6,182,212,0.20), transparent 50%);
      z-index: 1;
      pointer-events: none;
    }

    /* 🧊 LOGIN CARD */
    .login-card {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 420px;
      padding: 2.5rem;
      border-radius: 24px;

      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(18px);
      box-shadow: 0 24px 70px rgba(0,0,0,0.5);
      overflow: hidden;
    }

    /* ✨ NEON BORDER */
    .login-card::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 24px;
      padding: 2px;

      background: linear-gradient(
        90deg,
        transparent,
        #7c3aed,
        #06b6d4,
        #6366f1,
        transparent
      );

      background-size: 300% 300%;
      animation: glow 5s linear infinite;

      -webkit-mask:
        linear-gradient(#fff 0 0) content-box,
        linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;

      pointer-events: none;
    }

    @keyframes glow {
      0% { background-position: 300% 0; }
      100% { background-position: -300% 0; }
    }

    /* 🏷️ BRAND */
    .brand {
      text-align: center;
      font-size: 1.8rem;
      font-weight: 800;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #7c3aed, #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      text-align: center;
      font-size: 0.85rem;
      color: #aaa;
      margin-bottom: 2rem;
    }

    /* 🧾 INPUTS */
    .form-control-dark {
      background: rgba(255,255,255,0.06) !important;
      border: 1px solid rgba(255,255,255,0.12) !important;
      border-radius: 12px !important;
      color: #fff !important;
      padding: 0.75rem 1rem !important;
    }

    .form-control-dark:focus {
      border-color: #06b6d4 !important;
      box-shadow: 0 0 0 3px rgba(6,182,212,0.25) !important;
      background: rgba(255,255,255,0.1) !important;
      outline: none !important;
    }

    .form-control-dark::placeholder {
      color: rgba(255,255,255,0.4);
    }

    .form-label {
      font-size: 0.85rem;
      color: #ddd;
      margin-bottom: 6px;
    }

    /* 🔘 BUTTON */
    .btn-login {
      width: 100%;
      padding: 0.75rem;
      border-radius: 12px;
      border: none;
      font-weight: 600;
      color: #fff;

      background: linear-gradient(135deg, #7c3aed, #06b6d4);
      transition: 0.3s ease;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(124,58,237,0.35);
    }

    /* 🔗 LINKS */
    .divider {
      text-align: center;
      margin: 1.5rem 0;
      color: #666;
      font-size: 0.85rem;
    }

    .register-link {
      text-align: center;
      font-size: 0.85rem;
      color: #aaa;
    }

    .register-link a {
      color: #06b6d4;
      font-weight: 600;
      text-decoration: none;
    }

    .register-link a:hover {
      color: #fff;
    }

    /* ❌ ERROR */
    .alert-error {
      background: rgba(239,68,68,0.15);
      border: 1px solid rgba(239,68,68,0.3);
      color: #fca5a5;
      padding: 0.75rem;
      border-radius: 12px;
      font-size: 0.85rem;
      margin-bottom: 1rem;
    }

    /* 👁️ PASSWORD */
    .password-wrapper {
      position: relative;
    }

    .eye-icon {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #888;
      cursor: pointer;
    }

    .eye-icon:hover {
      color: #06b6d4;
    }

  </style>
</head>

<body>

  <!-- 🎬 VIDEO BACKGROUND -->
  <video class="bg-video" autoplay muted loop playsinline>
    <source src="https://stream.mux.com/Kec29dVyJgiPdtWaQtPuEiiGHkJIYQAVUJcNiIHUYeo.m3u8"></video>

  <div class="login-card">

    <div class="brand">
      <i class="fa-solid fa-bolt me-2"></i>TaskFlow
    </div>

    <div class="subtitle">Welcome back! Login to continue</div>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for message in messages %}
          <div class="alert-error">
            <i class="fa fa-circle-exclamation me-2"></i>{{ message }}
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form action="/login" method="POST">

      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" name="email"
               class="form-control form-control-dark"
               placeholder="your@email.com" required>
      </div>

      <div class="mb-4">
  <label class="form-label">Password</label>

  <div class="password-wrapper">
    <input type="password"
           name="password"
           id="password"
           class="form-control form-control-dark"
           placeholder="••••••••"
           required>

    <i class="fa fa-eye eye-icon" id="togglePassword"></i>
  </div>
</div>

      <button type="submit" class="btn-login">
        Login <i class="fa fa-arrow-right ms-2"></i>
      </button>

    </form>

    <div class="divider">— or —</div>

    <div class="register-link">
      Don't have an account? <a href="/register">Sign up</a>
    </div>

  </div>

  <script>
    const togglePassword = document.getElementById('togglePassword');
    const password = document.getElementById('password');

    togglePassword.addEventListener('click', () => {
      if (password.type === 'password') {
        password.type = 'text';
        togglePassword.classList.replace('fa-eye', 'fa-eye-slash');
      } else {
        password.type = 'password';
        togglePassword.classList.replace('fa-eye-slash', 'fa-eye');
      }
    });
  </script>

</body>
</html>
