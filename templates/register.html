<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register - TaskFlow</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: #050507;
      padding: 24px;
    }

    .bg-video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
      pointer-events: none;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 1;
}

    .register-card {
      width: 100%;
      max-width: 430px;
      background: rgba(10, 15, 10, 0.60);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(159, 232, 112, 0.20);
      border-radius: 22px;
      padding: 2.5rem;
      position: relative;
      z-index: 5;
      animation: glow 4s ease-in-out infinite;
      box-shadow:
          0 0 20px rgba(159,232,112,0.10),
          0 28px 80px rgba(0,0,0,0.45);
}

  .brand {
    font-size: 1.8rem;
    font-weight: 800;
    text-align: center;
    color: #9FE870;
    margin-bottom: 0.5rem;
    text-shadow: 0 0 10px rgba(159,232,112,0.3);
}   

    .subtitle {
      text-align: center;
      color: rgba(255,255,255,0.75);
      font-size: 0.9rem;
      margin-bottom: 2rem;
}

    .form-label {
      color: #ffffff;
      font-size: 0.86rem;
      font-weight: 600;
      margin-bottom: 6px;
}

    .form-control-light {
      background: rgba(255, 255, 255, 0.9) !important;
      border: 1px solid rgba(42, 60, 43, 0.18) !important;
      border-radius: 12px !important;
      color: #172117 !important;
      padding: 0.78rem 1rem !important;
      font-size: 0.95rem;
    }

    .form-control-light:focus {
      border-color: #6b8f3b !important;
      box-shadow: 0 0 0 3px rgba(107, 143, 59, 0.18) !important;
      outline: none !important;
      background: #ffffff !important;
    }

    .form-control-light::placeholder {
      color: #8b948d !important;
    }

    .btn-register {
      width: 100%;
      border: none;
      border-radius: 12px;
      padding: 0.85rem;
      background: linear-gradient(135deg, #6b8f3b, #9FE870);
      color: #0b1a0f;
      font-weight: 800;
      transition: 0.3s ease;
}
    .btn-register:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(159,232,112,0.25);
}

    .divider {
      text-align: center;
      color: rgba(255,255,255,0.6);
      margin: 1.5rem 0;
      font-size: 0.85rem;
}

    .login-link {
      text-align: center;
      color: rgba(255,255,255,0.75);
      font-size: 0.9rem;
}

    .login-link a {
      color: #9FE870;
      text-decoration: none;
      font-weight: 700;
}

    .login-link a:hover {
      color: #6b8f3b;
    }
    @keyframes glow {
      0% {
        box-shadow:
          0 0 10px rgba(159,232,112,0.08),
          0 28px 80px rgba(0,0,0,0.45);
  }

      50% {
          box-shadow:
            0 0 30px rgba(159,232,112,0.18),
            0 28px 80px rgba(0,0,0,0.45);
  }

       100% {
            box-shadow:
              0 0 10px rgba(159,232,112,0.08),
              0 28px 80px rgba(0,0,0,0.45);
  }
}
.password-wrapper {
  position: relative;
}

.toggle-password {
  position: absolute;
  right: 15px;
  top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
  color: #6b8f3b;
  font-size: 1rem;
}

.toggle-password:hover {
  color: #9FE870;
}

    .alert-error {
      background: rgba(239, 68, 68, 0.12);
      border: 1px solid rgba(239, 68, 68, 0.28);
      border-radius: 12px;
      padding: 0.75rem 1rem;
      color: #b91c1c;
      font-size: 0.85rem;
      margin-bottom: 1rem;
    }

    @media (max-width: 520px) {
      body {
        padding: 16px;
      }

      .register-card {
        padding: 2rem;
        animation: glow 4s ease-in-out infinite;
      }
    }
  </style>
</head>

<body>

  <video class="bg-video" autoplay muted loop playsinline>
    <source src="https://d8j0ntlcm91z4.cloudfront.net/user_38xzZboKViGWJOttwIXH07lWA1P/hf_20260307_083826_e938b29f-a43a-41ec-a153-3d4730578ab8.mp4" type="video/mp4">
  </video>

  <div class="overlay"></div>

  <div class="register-card">
    <div class="brand">
      <i class="fa-solid fa-bolt me-2"></i>TaskFlow
    </div>

    <div class="subtitle">Create your account to get started</div>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for message in messages %}
          <div class="alert-error">
            <i class="fa fa-circle-exclamation me-2"></i>{{ message }}
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form action="/register" method="POST">
      <div class="mb-3">
        <label class="form-label">Username</label>
        <input
          type="text"
          name="username"
          class="form-control form-control-light"
          placeholder="Your name"
          required
        >
      </div>

      <div class="mb-3">
        <label class="form-label">Email</label>
        <input
          type="email"
          name="email"
          class="form-control form-control-light"
          placeholder="your@email.com"
          required
        >
      </div>

      <div class="mb-4">
  <label class="form-label">Password</label>

  <div class="password-wrapper">
    <input
      type="password"
      name="password"
      id="password"
      class="form-control form-control-light"
      placeholder="••••••••"
      required
    >

    <span class="toggle-password" onclick="togglePassword()">
      <i id="eyeIcon" class="fa-solid fa-eye"></i>
    </span>
  </div>
</div>
      <button type="submit" class="btn-register">
        Create Account <i class="fa fa-arrow-right ms-2"></i>
      </button>
    </form>

    <div class="divider">— or —</div>

    <div class="login-link">
      Already have an account? <a href="/login">Login</a>
    </div>
  </div>
  <script>
function togglePassword() {
  const password = document.getElementById("password");
  const eyeIcon = document.getElementById("eyeIcon");

  if (password.type === "password") {
    password.type = "text";

    eyeIcon.classList.remove("fa-eye");
    eyeIcon.classList.add("fa-eye-slash");

  } else {
    password.type = "password";

    eyeIcon.classList.remove("fa-eye-slash");
    eyeIcon.classList.add("fa-eye");
  }
}
</script>

</body>
</html>
